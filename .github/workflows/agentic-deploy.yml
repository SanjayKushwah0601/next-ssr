# Generated by CICDAgent — Next.js SSR on EC2 (SSH + PM2)
name: Agentic Next.js SSR deploy (EC2)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TF_DB_HOST: ${{ secrets.DB_HOST }}
          TF_API_URL: "app-20260326160533708300000006-248675663.us-east-1.elb.amazonaws.com"
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: TF_DB_HOST,TF_API_URL
          script_stop: true
          script: |
            set -e
            export REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            APP_DIR="$HOME/agentic-app"
            mkdir -p "$HOME"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR" && git fetch origin && git reset --hard "origin/$(git rev-parse --abbrev-ref HEAD)" || git pull --ff-only
            else
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            [ -f package.json ] || { echo "No package.json"; exit 1; }
            install_node() {
              command -v node >/dev/null 2>&1 && return 0
              if command -v yum >/dev/null 2>&1; then
                curl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash -
                sudo yum install -y nodejs
              elif command -v apt-get >/dev/null 2>&1; then
                curl -fsSL https://deb.nodesource.com/setup_18.x | sudo bash -
                sudo apt-get update && sudo apt-get install -y nodejs
              else
                echo "Cannot install Node.js"; exit 1
              fi
            }
            install_node
            : > .env
            if [ -n "$TF_DB_HOST" ]; then echo "DB_HOST=$TF_DB_HOST" >> .env; fi
            if [ -n "$TF_API_URL" ]; then echo "API_URL=$TF_API_URL" >> .env; fi
            echo "PORT=3000" >> .env
            echo "NODE_ENV=production" >> .env
            npm ci || npm install
            npm run build
            sudo npm install -g pm2 2>/dev/null || npm install -g pm2
            pm2 delete app 2>/dev/null || true
            pm2 start npm --name "app" -- start
            pm2 save
