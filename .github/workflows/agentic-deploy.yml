# Generated by CICDAgent — EC2 SSM deploy (no public IP required)
# Requires: EC2 instance has AmazonSSMManagedInstanceCore IAM policy
name: Agentic EC2 deploy (SSM)

concurrency:
  group: agentic-ec2-ssm-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::396854161863:role/GitHubDeploy-yogeshtatwalzolute-next-ssr
          aws-region: us-east-1
      - name: Deploy via SSM
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          API_URL: "app-2026040208085160880000000c-1108665069.us-east-1.elb.amazonaws.com"
        run: |
          echo "Sending SSM command directly to instance: i-0ea502650eb92a807"
          SSM_PARAMS_JSON=$(printf '%s' '' | base64 -d)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-0ea502650eb92a807" \
            --document-name "AWS-RunShellScript" \
            --parameters "$SSM_PARAMS_JSON" \
            --region us-east-1 \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          FINAL_STATUS="Pending"
          for j in {1..60}; do
            FINAL_STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-0ea502650eb92a807" \
              --region us-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "SSM command status: $FINAL_STATUS (attempt $j/60)"
            if [ "$FINAL_STATUS" = "Success" ]; then
              break
            fi
            if [ "$FINAL_STATUS" = "Failed" ] || [ "$FINAL_STATUS" = "TimedOut" ] || [ "$FINAL_STATUS" = "Cancelled" ]; then
              break
            fi
            sleep 5
          done
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-0ea502650eb92a807" \
            --region us-east-1 \
            --query '[Status,StatusDetails,ResponseCode,StandardOutputContent,StandardErrorContent]' \
            --output text
          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "ERROR: SSM command did not succeed (status=$FINAL_STATUS)"
            exit 1
          fi
