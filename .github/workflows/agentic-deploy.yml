# Generated by CICDAgent — EC2 SSM deploy (no public IP required)
# Requires: EC2 instance has AmazonSSMManagedInstanceCore IAM policy
name: Agentic EC2 deploy (SSM)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::396854161863:role/GitHubDeploy-yogeshtatwalzolute-next-ssr
          aws-region: us-east-1
      - name: Deploy via SSM
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          DB_HOST: ${{ secrets.DB_HOST }}
          API_URL: "app-20260401064955509800000008-773337043.us-east-1.elb.amazonaws.com"
        run: |
          echo "Waiting for SSM instance Online: i-03b72c3ebfd155be3"
          SSM_PING_STATUS=""
          for i in {1..30}; do
            SSM_COUNT=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=i-03b72c3ebfd155be3" \
              --query 'length(InstanceInformationList)' \
              --output text 2>/dev/null || echo "0")
            if [ "$SSM_COUNT" = "0" ] || [ "$SSM_COUNT" = "None" ]; then
              SSM_PING_STATUS="NotRegistered"
            else
              SSM_PING_STATUS=$(aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=i-03b72c3ebfd155be3" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || echo "Unknown")
            fi
            echo "SSM PingStatus: $SSM_PING_STATUS (attempt $i/30)"
            if [ "$SSM_PING_STATUS" = "Online" ]; then break; fi
            sleep 10
          done
          if [ "$SSM_PING_STATUS" != "Online" ]; then
            echo "ERROR: EC2 instance is not SSM Online (PingStatus=$SSM_PING_STATUS)"
            echo "If PingStatus=NotRegistered: instance has no SSM inventory row — check IAM instance profile"
            echo "(AmazonSSMManagedInstanceCore), SSM agent running, and outbound HTTPS or VPC endpoints for SSM."
            exit 1
          fi
          SSM_PARAMS_JSON=$(printf '%s' '' | base64 -d)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-03b72c3ebfd155be3" \
            --document-name "AWS-RunShellScript" \
            --parameters "$SSM_PARAMS_JSON" \
            --region us-east-1 \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          FINAL_STATUS="Pending"
          for j in {1..60}; do
            FINAL_STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-03b72c3ebfd155be3" \
              --region us-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "SSM command status: $FINAL_STATUS (attempt $j/60)"
            if [ "$FINAL_STATUS" = "Success" ]; then
              break
            fi
            if [ "$FINAL_STATUS" = "Failed" ] || [ "$FINAL_STATUS" = "TimedOut" ] || [ "$FINAL_STATUS" = "Cancelled" ]; then
              break
            fi
            sleep 5
          done
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-03b72c3ebfd155be3" \
            --region us-east-1 \
            --query '[Status,StatusDetails,ResponseCode,StandardOutputContent,StandardErrorContent]' \
            --output text
          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "ERROR: SSM command did not succeed (status=$FINAL_STATUS)"
            exit 1
          fi
