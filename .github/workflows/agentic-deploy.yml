# Generated by CICDAgent (DRE) — EC2 deploy: git pull + restart only
# Runtime install/build handled by DRE bootstrap on EC2 (user_data)
name: Agentic EC2 deploy (DRE)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TF_DB_HOST: ${{ secrets.DB_HOST }}
          TF_API_URL: "app-20260331144350794800000008-1258178594.us-east-1.elb.amazonaws.com"
        with:
          host: "44.199.214.80"
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: TF_DB_HOST,TF_API_URL
          script_stop: true
          script: |
            set -e
            APP_DIR="$HOME/agentic-app"
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

            # ── Sync code ────────────────────────────────────────────────────────────────
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin
              git reset --hard "origin/$(git rev-parse --abbrev-ref HEAD)"
            else
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi
            cd "$APP_DIR"

            # ── Write env vars from Terraform outputs ────────────────────────────────────
            : > .env
            [ -n "$TF_DB_HOST" ] && echo "DB_HOST=$TF_DB_HOST" >> .env
            [ -n "$TF_API_URL" ] && echo "API_URL=$TF_API_URL" >> .env
            echo "PORT=3000" >> .env
            echo "NODE_ENV=production" >> .env

            # ── Smart deploy ─────────────────────────────────────────────────────────────
            # If pm2 app is online: simple restart (fast path, DRE already set everything up).
            # Otherwise: DRE bootstrap — install runtime, build, and start for the first time.
            if pm2 list 2>/dev/null | grep -qE "app.*online"; then
              pm2 restart app
              pm2 save
            else
              # First deploy or crashed — install runtime and start
              if ! command -v node >/dev/null 2>&1; then
                if command -v yum >/dev/null 2>&1; then
                  curl -fsSL https://rpm.nodesource.com/setup_18.x | bash -
                  yum install -y nodejs
                elif command -v apt-get >/dev/null 2>&1; then
                  curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
                  apt-get install -y nodejs
                else
                  echo "Cannot install Node.js" >&2; exit 1
                fi
              fi
              npm install
              npm run build 2>/dev/null || true
              command -v pm2 >/dev/null 2>&1 || npm install -g pm2
              pm2 stop app 2>/dev/null || true
              pm2 start npm --name "app" -- start
              pm2 save
              pm2 startup 2>/dev/null || true
            fi
