# Generated by CICDAgent — EC2 SSM deploy (no public IP required)
# Requires: EC2 instance has AmazonSSMManagedInstanceCore IAM policy
name: Agentic EC2 deploy (SSM)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::396854161863:role/GitHubDeploy-yogeshtatwalzolute-next-ssr
          aws-region: us-east-1
      - name: Deploy via SSM
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          COMMAND_ID=$(aws ssm send-command \\
            --instance-ids "i-03ec81eed8df8c739" \\
            --document-name "AWS-RunShellScript" \\
            --parameters 'commands=["set -e; APP_DIR=\\\"$HOME/agentic-app\\\"; REPO_URL=\\\"https://github.com/$GITHUB_REPOSITORY.git\\\"; if [ -d \\\"$APP_DIR/.git\\\" ]; then cd \\\"$APP_DIR\\\" && git fetch origin && git reset --hard origin/HEAD; else git clone \\\"$REPO_URL\\\" \\\"$APP_DIR\\\" && cd \\\"$APP_DIR\\\"; fi; cd \\\"$APP_DIR\\\"; : > .env; export DB_HOST="${{ secrets.DB_HOST }}"; [ -n \\\"$DB_HOST\\\" ] && echo \\\"DB_HOST=$DB_HOST\\\" >> .env; export API_URL="app-20260329093054858200000007-331249732.us-east-1.elb.amazonaws.com"; [ -n \\\"$API_URL\\\" ] && echo \\\"API_URL=$API_URL\\\" >> .env; echo NODE_ENV=production >> .env; if pm2 list 2>/dev/null | grep -qE \\\"app.*online\\\"; then pm2 restart app && pm2 save; else npm install && npm run build 2>/dev/null || true && command -v pm2 >/dev/null 2>&1 || npm install -g pm2 && pm2 stop app 2>/dev/null || true && pm2 start npm --name app -- start && pm2 save; fi"]' \\
            --region us-east-1 \\
            --query 'Command.CommandId' \\
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed \\
            --command-id "$COMMAND_ID" \\
            --instance-id "i-03ec81eed8df8c739" \\
            --region us-east-1
          aws ssm get-command-invocation \\
            --command-id "$COMMAND_ID" \\
            --instance-id "i-03ec81eed8df8c739" \\
            --region us-east-1 \\
            --query '[Status,StandardOutputContent,StandardErrorContent]' \\
            --output text
