# Generated by CICDAgent — EC2 SSM deploy (no public IP required)
# Requires: EC2 instance has AmazonSSMManagedInstanceCore IAM policy
name: Agentic EC2 deploy (SSM)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::396854161863:role/GitHubDeploy-yogeshtatwalzolute-next-ssr
          aws-region: us-east-1
      - name: Deploy via SSM
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Waiting for SSM instance Online: i-02bcfe6b5b9ffb791"
          SSM_PING_STATUS=""
          for i in {1..30}; do
            SSM_PING_STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=i-02bcfe6b5b9ffb791" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "Unknown" )
            echo "SSM PingStatus: $SSM_PING_STATUS (attempt $i/30)"
            if [ "$SSM_PING_STATUS" = "Online" ]; then break; fi
            sleep 10
          done
          if [ "$SSM_PING_STATUS" != "Online" ]; then
            echo "ERROR: EC2 instance is not SSM Online (PingStatus=$SSM_PING_STATUS)"
            exit 1
          fi
          SSM_PARAMS_JSON=$(printf '%s' '' | base64 -d)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-02bcfe6b5b9ffb791" \
            --document-name "AWS-RunShellScript" \
            --parameters "$SSM_PARAMS_JSON" \
            --region us-east-1 \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-02bcfe6b5b9ffb791" \
            --region us-east-1
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-02bcfe6b5b9ffb791" \
            --region us-east-1 \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text
